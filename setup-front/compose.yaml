services:
  server:
    image: azerty78/ben-djibril-site:latest
    environment:
      NODE_ENV: production
    # Port interne uniquement - blogpress-nginx fera le reverse proxy
    expose:
      - "80"
    restart: unless-stopped
    container_name: ben-djibril-site
    networks:
      - kobecorp-network

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
