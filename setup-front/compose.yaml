# Projet Compose unique — évite le conflit avec kobecorp-web
# (les deux dossiers s'appellent setup-front → même nom de projet par défaut)
name: ben-djibril

services:
  server:
    image: azerty78/ben-djibril-site:latest
    container_name: ben-djibril-site
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # blogpress-nginx proxifie vers ben-djibril-site:80 sur kobecorp-network
    expose:
      - "80"
    ports:
      - "127.0.0.1:4001:80"
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
