# Configuration Nginx (server block pour /etc/nginx/conf.d/default.conf)
# Domaine: ben-djibril.kobecorporation.com
# Note: ne pas mettre user / events / http ici — déjà gérés par /etc/nginx/nginx.conf

server {
    listen 80;
    listen [::]:80;
    server_name ben-djibril.kobecorporation.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    client_max_body_size 20M;
    server_tokens off;

    # Logs (format "main" défini dans nginx.conf de l'image)
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pas de cache pour le HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Routes SPA localisées (/en/..., /fr/...)
    location ~ ^/(en|fr)(/|$) {
        try_files $uri /index.html;
    }

    # Anciennes routes sans préfixe → SPA (redirect client LegacyRedirect)
    location = /projects {
        try_files /index.html =404;
    }
    location = /services {
        try_files /index.html =404;
    }
    location = /about {
        try_files /index.html =404;
    }
    location = /contact {
        try_files /index.html =404;
    }

    # SPA (React Router) — sans $uri/ pour éviter 403 sur un dossier sans index
    location / {
        try_files $uri /index.html;
    }

    # Bloquer les fichiers cachés
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /sitemap.xml {
        log_not_found off;
        access_log off;
    }

    location = /humans.txt {
        log_not_found off;
        access_log off;
    }

    location = /manifest.json {
        log_not_found off;
        access_log off;
    }

    location = /og-image.jpg {
        expires 7d;
        add_header Cache-Control "public";
        log_not_found off;
    }

    location /.well-known/ {
        log_not_found off;
        access_log off;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
